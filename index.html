<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>checkNews · 기사 편향 분석 (서버리스)</title>
  <style>
    :root {
      --bg: #f8fafc; --card: #ffffff; --border: #e5e7eb; --text: #1f2937;
      --muted: #6b7280; --faint: #9ca3af; --accent: #2563eb; --accent-hover: #1d4ed8;
      --field: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0;
        --muted: #94a3b8; --faint: #64748b; --accent: #3b82f6; --accent-hover: #60a5fa;
        --field: #0f172a;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic",
        "Apple SD Gothic Neo", sans-serif; line-height: 1.5;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 64px; }
    header h1 { font-size: 24px; font-weight: 700; margin: 0; }
    header p { margin: 6px 0 0; font-size: 14px; color: var(--muted); }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px; margin-top: 20px; box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    h2 { font-size: 14px; font-weight: 600; color: var(--text); margin: 0 0 12px; }
    label.field { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input[type=password], input[type=text], textarea {
      width: 100%; background: var(--field); color: var(--text);
      border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px;
      font-size: 14px; font-family: inherit; outline: none;
    }
    input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    textarea { resize: vertical; min-height: 180px; }
    .hint { font-size: 12px; color: var(--faint); margin-top: 6px; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 12px; flex-wrap: wrap; }
    .chk { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); cursor: pointer; user-select: none; }
    .chk input { width: 15px; height: 15px; accent-color: var(--accent); }
    button.primary {
      background: var(--accent); color: #fff; border: none; border-radius: 9px;
      padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button.primary:hover { background: var(--accent-hover); }
    button.primary:disabled { opacity: .5; cursor: not-allowed; }
    .error {
      background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca;
      border-radius: 10px; padding: 12px 14px; font-size: 14px; margin-top: 16px;
    }
    @media (prefers-color-scheme: dark) {
      .error { background: #7f1d1d33; color: #fca5a5; border-color: #7f1d1d; }
    }
    /* 결과 */
    .result-head { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
    .gauge { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .gauge-label { font-size: 13px; font-weight: 700; }
    .result-body { flex: 1; min-width: 220px; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .badge { font-size: 12px; font-weight: 600; border-radius: 6px; padding: 3px 9px; }
    .badge.gpt { background: #ede9fe; color: #7c3aed; }
    .badge.clean { background: #d1fae5; color: #047857; }
    @media (prefers-color-scheme: dark) {
      .badge.gpt { background: #7c3aed33; color: #c4b5fd; }
      .badge.clean { background: #04785733; color: #6ee7b7; }
    }
    .section { margin-top: 14px; }
    .label { font-size: 12px; font-weight: 700; color: var(--muted); margin: 0 0 5px; }
    .text { font-size: 14px; color: var(--text); margin: 0; line-height: 1.65; }
    .article {
      font-size: 14px; line-height: 1.8; color: var(--text); white-space: normal;
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px; max-height: 320px; overflow-y: auto;
    }
    .article mark { background: #fde68a; color: #78350f; padding: 0 2px; border-radius: 3px; }
    .reasons { list-style: none; padding: 0; margin: 12px 0 0; }
    .reasons li {
      border-left: 3px solid var(--accent); padding: 6px 0 6px 12px; margin-bottom: 10px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .reasons .q { font-size: 13px; color: var(--text); font-weight: 500; }
    .reasons .r { font-size: 12px; color: var(--muted); }
    footer { margin-top: 28px; font-size: 12px; color: var(--faint); text-align: center; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>기사 편향 분석</h1>
      <p>서버 없이 브라우저에서 OpenAI API로 직접 분석합니다. 기사 본문을 붙여넣으세요.</p>
    </header>

    <!-- API 키 -->
    <div class="card">
      <h2>OpenAI API 키</h2>
      <label class="field" for="apiKey">본인 키를 입력하세요. 브라우저(localStorage)에만 저장되며 OpenAI로만 전송됩니다.</label>
      <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false" />
      <p class="hint">키는 서버로 전송되지 않습니다. 이 페이지는 정적 파일이라 저장/공유되지 않습니다.</p>
    </div>

    <!-- 본문 -->
    <div class="card">
      <h2>기사 본문</h2>
      <textarea id="body" placeholder="분석할 기사 본문을 붙여넣으세요…"></textarea>
      <div class="row">
        <div style="display:flex; align-items:center; gap:16px;">
          <span class="hint" id="charCount" style="margin-top:0">0자</span>
          <label class="chk">
            <input id="cleanBody" type="checkbox" />
            GPT 본문 정제 <span class="hint" style="margin-top:0">(광고·기자정보 제거)</span>
          </label>
        </div>
        <button id="analyzeBtn" class="primary">편향 분석하기</button>
      </div>
    </div>

    <div id="errorBox" class="error" hidden></div>
    <div id="resultBox" hidden></div>

    <footer>
      checkNews · 서버리스 프론트엔드 버전 · 편향 점수(백분율) + 높음/중간/낮음 평가
    </footer>
  </div>

  <!-- env.js: 있으면 window.OPENAI_API_KEY 를 자동으로 불러옵니다 (커밋되지 않음) -->
  <script src="env.js"></script>
  <script src="app.js"></script>
</body>
</html>
